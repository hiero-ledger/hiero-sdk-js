version: 2
updates:
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
        interval: "daily"
      open-pull-requests-limit: 10
    - package-ecosystem: npm
      directory: "/"
      schedule:
          interval: monthly
      open-pull-requests-limit: 40
      versioning-strategy: increase
      ignore:
          # For all packages, ignore all minor & patch updates
          - dependency-name: "*"
            update-types:
                ["version-update:semver-minor", "version-update:semver-patch"]
          # @noble/curves v2+ is ESM-only and breaks the CommonJS (lib/*.cjs)
          # build of @hiero-ledger/cryptography — see #4259
          - dependency-name: "@noble/curves"
            versions: [">=2.0.0"]
