name: 'Slack Issue Comment Notification'
on:
  issue_comment:
    types:
      - created

env:
  js-sdk-channel-id: C0958RN2ZTR

defaults:
  run:
    shell: bash

permissions:
  contents: read
  issues: read

jobs:
  notify-slack:
    name: Notify Slack
    if: ${{ !github.event.issue.pull_request && github.event.comment.user.login != 'dependabot[bot]' && github.event.comment.user.login != 'codacy-production[bot]' }}
    runs-on: hiero-client-sdk-linux-medium
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Prepare comment body
        id: comment
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          BODY=$(echo "$COMMENT_BODY" | sed 's/^[[:space:]]*//')
          if [ -z "$BODY" ]; then
            BODY="_Empty comment._"
          elif [ ${#BODY} -gt 300 ]; then
            BODY="${BODY:0:300}..."
          fi
          {
            echo "text<<EOFMULTI"
            echo "$BODY"
            echo "EOFMULTI"
          } >> "$GITHUB_OUTPUT"

      - name: Send Slack Notification
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ env.js-sdk-channel-id }}",
              "text": "New comment on issue <${{ github.event.issue.html_url }}|#${{ github.event.issue.number }}: ${{ github.event.issue.title }}>",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":speech_balloon: *New Comment on Issue*\n*<${{ github.event.comment.html_url }}|#${{ github.event.issue.number }}: ${{ github.event.issue.title }}>*"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.event.comment.user.login }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Comment:*\n${{ steps.comment.outputs.text }}"
                  }
                }
              ]
            }
