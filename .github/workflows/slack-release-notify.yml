name: 'Slack Release Notification'
on:
  release:
    types:
      - published

env:
  js-sdk-channel-id: C0958RN2ZTR

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  notify-slack:
    name: Notify Slack
    runs-on: hiero-client-sdk-linux-medium
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit

      - name: Send Slack Notification
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ env.js-sdk-channel-id }}",
              "text": ":js-release: New release published: ${{ github.event.release.tag_name }} — <${{ github.event.release.html_url }}|View release>"
            }
