name: Build & Test
on:
  push:
    branches:
      - main
      - develop
      - release/*
      - integration-test-workflow
  pull_request:
    branches:
      - main
      - develop
      - release/*

defaults:
  run:
    shell: bash

permissions:
  contents: read
  pull-requests: write

env:
  CG_EXEC: ionice -c 2 -n 2 nice -n 19

jobs:
  build:
    name: Build using Node ${{ matrix.node }}
    runs-on: hiero-client-sdk-linux-medium
    strategy:
      matrix:
        node: [ "22", "24" ]

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.35.1

      - name: Install PNPM
        uses: step-security/action-setup@3d419c73e38e670dbffe349ffff26dd13c164640 # v4.2.0
        with:
          version: 9.15.5

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Build @hiero-ledger/sdk
        run: task -v build

  test:
    name: Test using Node ${{ matrix.node }}
    runs-on: hiero-client-sdk-linux-large
    strategy:
      matrix:
        node: [ "22" ]

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.35.1

      - name: Install PNPM
        uses: step-security/action-setup@3d419c73e38e670dbffe349ffff26dd13c164640 # v4.2.0
        with:
          version: 9.15.5

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: task install

      - name: Install Playwright Dependencies
        id: playwright-deps
        run: |
          sudo npx playwright install-deps
          npx playwright install

      - name: Check Docker Resources
        run: |
          read cpus mem <<<"$(docker info --format '{{.NCPU}} {{.MemTotal}}')"
          mem_gb=$(awk -v m="$mem" 'BEGIN{printf "%.1f", m/1000000000}')
          echo "CPU cores: $cpus"
          echo "Memory: ${mem_gb} GB"

      - name: Setup Kind
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3
        with:
          install_only: true
          node_image: kindest/node:v1.31.4@sha256:2cb39f7295fe7eafee0842b1052a599a4fb0f8bcf3f83d96c7f4864c357c6c30
          version: v0.26.0
          kubectl_version: v1.31.4
          verbosity: 3
          wait: 120s

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.12.0

      - name: Install Solo CLI
        run: |
          set -euo pipefail
          npm install -g @hashgraph/solo@0.61.0
          solo --version
          kind --version

      - name: Deploy Solo
        id: solo
        env:
          SOLO_CLUSTER_NAME: solo
          SOLO_NAMESPACE: solo
          SOLO_CLUSTER_SETUP_NAMESPACE: solo-cluster
          SOLO_DEPLOYMENT: solo-deployment
        run: |
          set -euo pipefail
          kind create cluster -n "${SOLO_CLUSTER_NAME}"

          timeout_command=()
          if command -v timeout >/dev/null 2>&1; then
            timeout_command=(timeout --preserve-status 40m)
          elif command -v gtimeout >/dev/null 2>&1; then
            timeout_command=(gtimeout --preserve-status 40m)
          fi

          TEST_EXIT_CODE=0
          set +e
          "${timeout_command[@]}" solo one-shot single deploy --deployment "${SOLO_DEPLOYMENT}" --dev 2>&1 | tee solo-deploy.log
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          set -e
          echo "deployExitCode=${TEST_EXIT_CODE}" >> "${GITHUB_OUTPUT}"

          if [[ "${TEST_EXIT_CODE}" -ne 0 ]]; then
            echo "Solo deploy failed with exit code ${TEST_EXIT_CODE}. Continuing to upload logs."
            exit 0
          fi

          solo ledger account create --deployment "${SOLO_DEPLOYMENT}" --dev | tee solo-account-ed25519.log
          account_id="$(grep -Eo 'accountId[:[:space:]]+[0-9]+\.[0-9]+\.[0-9]+' solo-account-ed25519.log | tail -n1 | awk '{print $2}')"
          if [[ -z "${account_id}" ]]; then
            account_id="$(grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' solo-account-ed25519.log | tail -n1)"
          fi
          if [[ -z "${account_id}" ]]; then
            echo "Failed to parse ED25519 account ID from Solo output" >&2
            exit 1
          fi

          solo ledger account update --account-id "${account_id}" --hbar-amount 100 --deployment "${SOLO_DEPLOYMENT}" --dev

          encoded_key=""
          for _ in {1..30}; do
            encoded_key="$(kubectl get secret "account-key-${account_id}" -n "${SOLO_NAMESPACE}" -o jsonpath='{.data.privateKey}' 2>/dev/null || true)"
            if [[ -n "${encoded_key}" ]]; then
              break
            fi
            sleep 2
          done
          if [[ -z "${encoded_key}" ]]; then
            echo "Failed to fetch private key secret for ${account_id}" >&2
            exit 1
          fi

          private_key="$(echo "${encoded_key}" | base64 --decode)"
          if [[ -z "${private_key}" ]]; then
            echo "Failed to decode private key for ${account_id}" >&2
            exit 1
          fi

          {
            echo "ed25519AccountId=${account_id}"
            echo "ed25519PrivateKey=${private_key}"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload Solo Debug Logs (Test)
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: solo-debug-test
          path: |
            ./solo-deploy.log
            ./solo-account-ed25519.log
            ~/.solo/logs/*
          overwrite: true
          if-no-files-found: warn

      - name: Fail if Solo Deploy Failed (Test)
        if: ${{ steps.solo.outputs.deployExitCode != '0' }}
        run: |
          echo "Solo deployment failed with exit code ${{ steps.solo.outputs.deployExitCode }}"
          exit 1

      - name: Set Operator Account
        run: |
          echo "OPERATOR_KEY=${{ steps.solo.outputs.ed25519PrivateKey }}" >> $GITHUB_ENV
          echo "OPERATOR_ID=${{ steps.solo.outputs.ed25519AccountId }}" >> $GITHUB_ENV
          echo "GENESIS_OPERATOR_KEY=302e020100300506032b65700422042091132178e72057a1d7528025956fe39b0b847f200ab59b2fdd367017f3087137" >> $GITHUB_ENV
          echo "GENESIS_OPERATOR_ID=0.0.2" >> $GITHUB_ENV
          echo "HEDERA_NETWORK=local-node" >> $GITHUB_ENV

      - name: Run Hedera SDK Integration Tests
        run: ${{ env.CG_EXEC }} task test:integration:codecov

      - name: Build @hiero-ledger/cryptography
        working-directory: packages/cryptography
        run: ${{ env.CG_EXEC }} task build

      - name: Unit Coverage @hiero-ledger/cryptography
        working-directory: packages/cryptography
        run: ${{ env.CG_EXEC }} task test:unit:codecov

      - name: Test Unit Coverage @hiero-ledger/sdk
        run: ${{ env.CG_EXEC }} task test:unit:codecov

      - name: Upload Test Coverage Artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: coverage-test
          if-no-files-found: error
          path: |
            ./coverage/node-integration/lcov.info
            ./coverage/browser-integration/lcov.info
            ./packages/cryptography/coverage/node/lcov.info
            ./packages/cryptography/coverage/browser/lcov.info
            ./coverage/node/lcov.info
            ./coverage/browser/lcov.info

  dab-tests:
    name: DAB Tests using Node ${{ matrix.node }}
    runs-on: hiero-client-sdk-linux-medium
    strategy:
      matrix:
        node: [ "22" ]

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.35.1

      - name: Install PNPM
        uses: step-security/action-setup@3d419c73e38e670dbffe349ffff26dd13c164640 # v4.2.0
        with:
          version: 9.15.5

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: task install

      - name: Install Playwright Dependencies
        id: playwright-deps
        run: |
          sudo npx playwright install-deps
          npx playwright install

      - name: Check Docker Resources
        run: |
          read cpus mem <<<"$(docker info --format '{{.NCPU}} {{.MemTotal}}')"
          mem_gb=$(awk -v m="$mem" 'BEGIN{printf "%.1f", m/1000000000}')
          echo "CPU cores: $cpus"
          echo "Memory: ${mem_gb} GB"

      - name: Setup Kind
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3
        with:
          install_only: true
          node_image: kindest/node:v1.31.4@sha256:2cb39f7295fe7eafee0842b1052a599a4fb0f8bcf3f83d96c7f4864c357c6c30
          version: v0.26.0
          kubectl_version: v1.31.4
          verbosity: 3
          wait: 120s

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.12.0

      - name: Install Solo CLI
        run: |
          set -euo pipefail
          npm install -g @hashgraph/solo@0.61.0
          solo --version
          kind --version

      - name: Deploy Solo
        id: solo
        env:
          SOLO_CLUSTER_NAME: solo
          SOLO_NAMESPACE: solo
          SOLO_CLUSTER_SETUP_NAMESPACE: solo-cluster
          SOLO_DEPLOYMENT: solo-deployment
        run: |
          set -euo pipefail
          kind create cluster -n "${SOLO_CLUSTER_NAME}"

          timeout_command=()
          if command -v timeout >/dev/null 2>&1; then
            timeout_command=(timeout --preserve-status 40m)
          elif command -v gtimeout >/dev/null 2>&1; then
            timeout_command=(gtimeout --preserve-status 40m)
          fi

          TEST_EXIT_CODE=0
          set +e
          "${timeout_command[@]}" solo one-shot single deploy --deployment "${SOLO_DEPLOYMENT}" --num-consensus-nodes 2 --dev 2>&1 | tee solo-deploy.log
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          set -e
          echo "deployExitCode=${TEST_EXIT_CODE}" >> "${GITHUB_OUTPUT}"

          if [[ "${TEST_EXIT_CODE}" -ne 0 ]]; then
            echo "Solo deploy failed with exit code ${TEST_EXIT_CODE}. Continuing to upload logs."
            exit 0
          fi

          solo ledger account create --deployment "${SOLO_DEPLOYMENT}" --dev | tee solo-account-ed25519.log
          account_id="$(grep -Eo 'accountId[:[:space:]]+[0-9]+\.[0-9]+\.[0-9]+' solo-account-ed25519.log | tail -n1 | awk '{print $2}')"
          if [[ -z "${account_id}" ]]; then
            account_id="$(grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' solo-account-ed25519.log | tail -n1)"
          fi
          if [[ -z "${account_id}" ]]; then
            echo "Failed to parse ED25519 account ID from Solo output" >&2
            exit 1
          fi

          solo ledger account update --account-id "${account_id}" --hbar-amount 100 --deployment "${SOLO_DEPLOYMENT}" --dev

          encoded_key=""
          for _ in {1..30}; do
            encoded_key="$(kubectl get secret "account-key-${account_id}" -n "${SOLO_NAMESPACE}" -o jsonpath='{.data.privateKey}' 2>/dev/null || true)"
            if [[ -n "${encoded_key}" ]]; then
              break
            fi
            sleep 2
          done
          if [[ -z "${encoded_key}" ]]; then
            echo "Failed to fetch private key secret for ${account_id}" >&2
            exit 1
          fi

          private_key="$(echo "${encoded_key}" | base64 --decode)"
          if [[ -z "${private_key}" ]]; then
            echo "Failed to decode private key for ${account_id}" >&2
            exit 1
          fi

          {
            echo "ed25519AccountId=${account_id}"
            echo "ed25519PrivateKey=${private_key}"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload Solo Debug Logs (DAB)
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: solo-debug-dab
          path: |
            ./solo-deploy.log
            ./solo-account-ed25519.log
            ~/.solo/logs/*
          overwrite: true
          if-no-files-found: warn

      - name: Fail if Solo Deploy Failed (DAB)
        if: ${{ steps.solo.outputs.deployExitCode != '0' }}
        run: |
          echo "Solo deployment failed with exit code ${{ steps.solo.outputs.deployExitCode }}"
          exit 1

      - name: Set Operator Account
        run: |
          echo "OPERATOR_KEY=${{ steps.solo.outputs.ed25519PrivateKey }}" >> $GITHUB_ENV
          echo "OPERATOR_ID=${{ steps.solo.outputs.ed25519AccountId }}" >> $GITHUB_ENV
          echo "GENESIS_OPERATOR_KEY=302e020100300506032b65700422042091132178e72057a1d7528025956fe39b0b847f200ab59b2fdd367017f3087137" >> $GITHUB_ENV
          echo "GENESIS_OPERATOR_ID=0.0.2" >> $GITHUB_ENV
          echo "HEDERA_NETWORK=local-node" >> $GITHUB_ENV

      - name: Run DAB Integration Coverage
        run: task test:integration:dual-mode:codecov

      - name: Upload DAB Coverage Artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: coverage-dab
          if-no-files-found: error
          path: |
            ./coverage/node-integration-dual-mode/lcov.info
            ./coverage/browser-integration-dual-mode/lcov.info

  coverage-upload:
    name: Upload Coverage to Codecov
    runs-on: hiero-client-sdk-linux-medium
    needs:
      - test
      - dab-tests

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Download Test Coverage Artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: coverage-test
          path: .

      - name: Download DAB Coverage Artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: coverage-dab
          path: .

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: >-
            ./coverage/node-integration/lcov.info,
            ./coverage/browser-integration/lcov.info,
            ./packages/cryptography/coverage/node/lcov.info,
            ./packages/cryptography/coverage/browser/lcov.info,
            ./coverage/node/lcov.info,
            ./coverage/browser/lcov.info,
            ./coverage/node-integration-dual-mode/lcov.info,
            ./coverage/browser-integration-dual-mode/lcov.info
          fail_ci_if_error: true

  examples:
    name: Run examples using Node ${{ matrix.node }}
    runs-on: hiero-client-sdk-linux-medium
    strategy:
      matrix:
        node: [ "22" ]
    steps:
      -  name: Harden Runner
         uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
         with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.35.1

      - name: Install PNPM
        uses: step-security/action-setup@3d419c73e38e670dbffe349ffff26dd13c164640 # v4.2.0
        with:
          version: 9.15.5

