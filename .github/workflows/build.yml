name: Build & Test
on:
  push:
    branches:
      - main
      - develop
      - release/*
      - integration-test-workflow
  pull_request:
    branches:
      - main
      - develop
      - release/*

defaults:
  run:
    shell: bash

permissions:
  contents: read
  pull-requests: write

env:
  CG_EXEC: ionice -c 2 -n 2 nice -n 19

jobs:
  build:
    name: Build using Node ${{ matrix.node }}
    runs-on: hiero-client-sdk-linux-medium
    strategy:
      matrix:
        node: [ "22", "24" ]

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.35.1

      - name: Install PNPM
        uses: step-security/action-setup@3d419c73e38e670dbffe349ffff26dd13c164640 # v4.2.0
        with:
          version: 9.15.5

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Build @hiero-ledger/sdk
        run: task -v build

  test:
    name: Test using Node ${{ matrix.node }}
    runs-on: hiero-client-sdk-linux-large
    strategy:
      matrix:
        node: [ "22" ]

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.35.1

      - name: Install PNPM
        uses: step-security/action-setup@3d419c73e38e670dbffe349ffff26dd13c164640 # v4.2.0
        with:
          version: 9.15.5

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: task install

      - name: Install Playwright Dependencies
        id: playwright-deps
        run: |
          sudo npx playwright install-deps
          npx playwright install

      - name: Prepare Hiero Solo
        id: solo
        uses: hiero-ledger/hiero-solo-action@4d42a74e8e644a2753f3bb7a2afa429305375b14 # v0.17
        with:
          installMirrorNode: true
          soloVersion: v0.69.0
          hieroVersion: v0.73.0
          mirrorNodeVersion: v0.153.0
          grpcProxyPort: 8080

      # Mitigate a cold-start race in the mirror node's rest-java service.
      # FeeEstimationService loads the simple fee schedule via
      # @EventListener(ApplicationReadyEvent.class). On a fresh solo, that
      # event can fire before the consensus node has produced the genesis
      # fee-schedule block into mirror's DB, leaving the calculator null and
      # making every FeeEstimateQuery 400 with "Unknown transaction type"
      # until the @Scheduled refresh fires (10 minutes later by default).
      #
      # Workaround: wait for the fee schedule data to land in mirror's DB,
      # then bounce the rest-java pod so its ApplicationReadyEvent re-fires
      # against a populated DB. This matches the manual "restart solo"
      # workaround that's been verified locally. See HIP-1261.
      - name: Warm up mirror node fee schedule
        run: |
          set -euo pipefail
          NS=solo
          DEPLOY=mirror-1-restjava

          echo "Waiting for ${DEPLOY} to be available before bounce..."
          kubectl rollout status -n "${NS}" "deployment/${DEPLOY}" --timeout=180s

          echo "Sleeping 30s to let consensus push the genesis fee schedule into mirror DB..."
          sleep 30

          echo "Restarting ${DEPLOY} so ApplicationReadyEvent re-fires with fee schedule populated..."
          kubectl rollout restart -n "${NS}" "deployment/${DEPLOY}"
          kubectl rollout status  -n "${NS}" "deployment/${DEPLOY}" --timeout=180s

          echo "Allowing the rebooted rest-java to finish Spring context init..."
          sleep 30

      - name: Set Operator Account
        run: |
          echo "OPERATOR_KEY=${{ steps.solo.outputs.ed25519PrivateKey }}" >> $GITHUB_ENV
          echo "OPERATOR_ID=${{ steps.solo.outputs.ed25519AccountId }}" >> $GITHUB_ENV
          echo "GENESIS_OPERATOR_KEY=302e020100300506032b65700422042091132178e72057a1d7528025956fe39b0b847f200ab59b2fdd367017f3087137" >> $GITHUB_ENV
          echo "GENESIS_OPERATOR_ID=0.0.2" >> $GITHUB_ENV
          echo "HEDERA_NETWORK=local-node" >> $GITHUB_ENV

      - name: Run Hedera SDK Integration Tests
        run: ${{ env.CG_EXEC }} task test:integration:codecov

      - name: Build @hiero-ledger/cryptography
        working-directory: packages/cryptography
        run: ${{ env.CG_EXEC }} task build

      - name: Unit Coverage @hiero-ledger/cryptography
        working-directory: packages/cryptography
        run: ${{ env.CG_EXEC }} task test:unit:codecov

      - name: Test Unit Coverage @hiero-ledger/sdk
        run: ${{ env.CG_EXEC }} task test:unit:codecov

      - name: Upload Test Coverage Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-test
          if-no-files-found: error
          path: |
            ./coverage/node-integration/lcov.info
            ./coverage/browser-integration/lcov.info
            ./packages/cryptography/coverage/node/lcov.info
            ./packages/cryptography/coverage/browser/lcov.info
            ./coverage/node/lcov.info
            ./coverage/browser/lcov.info

  dab-tests:
    name: DAB Tests using Node ${{ matrix.node }}
    runs-on: hiero-client-sdk-linux-medium
    strategy:
      matrix:
        node: [ "22" ]

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.35.1

      - name: Install PNPM
        uses: step-security/action-setup@3d419c73e38e670dbffe349ffff26dd13c164640 # v4.2.0
        with:
          version: 9.15.5

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: task install

      - name: Install Playwright Dependencies
        id: playwright-deps
        run: |
          sudo npx playwright install-deps
          npx playwright install

      - name: Prepare Hiero Solo
        id: solo
        uses: hiero-ledger/hiero-solo-action@4d42a74e8e644a2753f3bb7a2afa429305375b14 # 0.17.0
        with:
          installMirrorNode: true
          soloVersion: v0.69.0
          hieroVersion: v0.73.0
          mirrorNodeVersion: 0.153.0
          grpcProxyPort: 8080
          dualMode: true
          dualModeGrpcProxyPort: 8081

      - name: Set Operator Account
        run: |
          echo "OPERATOR_KEY=${{ steps.solo.outputs.ed25519PrivateKey }}" >> $GITHUB_ENV
          echo "OPERATOR_ID=${{ steps.solo.outputs.ed25519AccountId }}" >> $GITHUB_ENV
          echo "GENESIS_OPERATOR_KEY=302e020100300506032b65700422042091132178e72057a1d7528025956fe39b0b847f200ab59b2fdd367017f3087137" >> $GITHUB_ENV
          echo "GENESIS_OPERATOR_ID=0.0.2" >> $GITHUB_ENV
          echo "HEDERA_NETWORK=local-node" >> $GITHUB_ENV

      - name: Run DAB Integration Coverage
        run: task test:integration:dual-mode:codecov

      - name: Upload DAB Coverage Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-dab
          if-no-files-found: error
          path: |
            ./coverage/node-integration-dual-mode/lcov.info
            ./coverage/browser-integration-dual-mode/lcov.info

  coverage-upload:
    name: Upload Coverage to Codecov
    runs-on: hiero-client-sdk-linux-medium
    needs:
      - test
      - dab-tests

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Download Test Coverage Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-test
          path: .

      - name: Download DAB Coverage Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-dab
          path: .

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: >-
            ./coverage/node-integration/lcov.info,
            ./coverage/browser-integration/lcov.info,
            ./packages/cryptography/coverage/node/lcov.info,
            ./packages/cryptography/coverage/browser/lcov.info,
            ./coverage/node/lcov.info,
            ./coverage/browser/lcov.info,
            ./coverage/node-integration-dual-mode/lcov.info,
            ./coverage/browser-integration-dual-mode/lcov.info
          fail_ci_if_error: true

  examples:
    name: Run examples using Node ${{ matrix.node }}
    runs-on: hiero-client-sdk-linux-medium
    strategy:
      matrix:
        node: [ "22" ]
    steps:
      -  name: Harden Runner
         uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
         with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.35.1

      - name: Install PNPM
        uses: step-security/action-setup@3d419c73e38e670dbffe349ffff26dd13c164640 # v4.2.0
        with:
          version: 9.15.5

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies and build SDK
        run: task build

      - name: Prepare Hiero Solo
        id: solo
        uses: hiero-ledger/hiero-solo-action@4d42a74e8e644a2753f3bb7a2afa429305375b14 # v0.17
        with:
          installMirrorNode: true
          hieroVersion: v0.73.0
          mirrorNodeVersion: v0.153.0
          soloVersion: v0.69.0
          grpcProxyPort: 8080

      - name: Set Operator Account
        run: |
          echo "OPERATOR_KEY=${{ steps.solo.outputs.ecdsaPrivateKey }}" >> $GITHUB_ENV
          echo "OPERATOR_ID=${{ steps.solo.outputs.ecdsaAccountId }}" >> $GITHUB_ENV
          echo "GENESIS_OPERATOR_KEY=302e020100300506032b65700422042091132178e72057a1d7528025956fe39b0b847f200ab59b2fdd367017f3087137" >> $GITHUB_ENV
          echo "GENESIS_OPERATOR_ID=0.0.2" >> $GITHUB_ENV
          echo "HEDERA_NETWORK=local-node" >> $GITHUB_ENV

      - name: Install examples dependencies
        run: |
          cd examples
          pnpm i

      - name: Run all examples
        run: task run:examples
