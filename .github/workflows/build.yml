name: Build & Test
on:
  push:
    branches:
      - main
      - develop
      - release/*
      - integration-test-workflow
  pull_request:
    branches:
      - main
      - develop
      - release/*

defaults:
  run:
    shell: bash

permissions:
  contents: read
  pull-requests: write

env:
  CG_EXEC: ionice -c 2 -n 2 nice -n 19

jobs:
  build:
    name: Build using Node ${{ matrix.node }}
    runs-on: hiero-client-sdk-linux-medium
    strategy:
      matrix:
        node: [ "22", "24" ]

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.35.1

      - name: Install PNPM
        uses: step-security/action-setup@3d419c73e38e670dbffe349ffff26dd13c164640 # v4.2.0
        with:
          version: 9.15.5

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Build @hiero-ledger/sdk
        run: task -v build

  test:
    name: Test using Node ${{ matrix.node }}
    runs-on: hiero-client-sdk-linux-medium
    strategy:
      matrix:
        node: [ "22" ]

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.35.1

      - name: Install PNPM
        uses: step-security/action-setup@3d419c73e38e670dbffe349ffff26dd13c164640 # v4.2.0
        with:
          version: 9.15.5

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: task install

      - name: Install Playwright Dependencies
        id: playwright-deps
        run: |
          sudo npx playwright install-deps
          npx playwright install

      - name: Prepare Hiero Solo
        id: solo
        uses: hiero-ledger/hiero-solo-action@4d42a74e8e644a2753f3bb7a2afa429305375b14 # v0.17
        with:
          installMirrorNode: true
          soloVersion: v0.68.0
          hieroVersion: v0.72.0
          mirrorNodeVersion: v0.151.0
          grpcProxyPort: 8080

      - name: Set Operator Account
        run: |
          echo "OPERATOR_KEY=${{ steps.solo.outputs.ed25519PrivateKey }}" >> $GITHUB_ENV
          echo "OPERATOR_ID=${{ steps.solo.outputs.ed25519AccountId }}" >> $GITHUB_ENV
          echo "GENESIS_OPERATOR_KEY=302e020100300506032b65700422042091132178e72057a1d7528025956fe39b0b847f200ab59b2fdd367017f3087137" >> $GITHUB_ENV
          echo "GENESIS_OPERATOR_ID=0.0.2" >> $GITHUB_ENV
          echo "HEDERA_NETWORK=local-node" >> $GITHUB_ENV

      - name: Run Hedera SDK Integration Tests
        run: ${{ env.CG_EXEC }} task test:integration:codecov

      - name: Build @hiero-ledger/cryptography
        working-directory: packages/cryptography
        run: ${{ env.CG_EXEC }} task build

      - name: Unit Coverage @hiero-ledger/cryptography
        working-directory: packages/cryptography
        run: ${{ env.CG_EXEC }} task test:unit:codecov

      - name: Test Unit Coverage @hiero-ledger/sdk
        run: ${{ env.CG_EXEC }} task test:unit:codecov

      - name: Upload Test Coverage Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-test
          if-no-files-found: error
          path: |
            ./coverage/node-integration/lcov.info
            ./coverage/browser-integration/lcov.info
            ./packages/cryptography/coverage/node/lcov.info
            ./packages/cryptography/coverage/browser/lcov.info
            ./coverage/node/lcov.info
            ./coverage/browser/lcov.info

  dab-tests:
    name: DAB Tests using Node ${{ matrix.node }}
    runs-on: hiero-client-sdk-linux-medium
    strategy:
      matrix:
        node: [ "22" ]

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.35.1

      - name: Install PNPM
        uses: step-security/action-setup@3d419c73e38e670dbffe349ffff26dd13c164640 # v4.2.0
        with:
          version: 9.15.5

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: task install

      - name: Install Playwright Dependencies
        id: playwright-deps
        run: |
          sudo npx playwright install-deps
          npx playwright install

      - name: Prepare Hiero Solo
        id: solo
        uses: hiero-ledger/hiero-solo-action@4d42a74e8e644a2753f3bb7a2afa429305375b14 # 0.17.0
        with:
          installMirrorNode: true
          soloVersion: v0.68.0
          hieroVersion: v0.72.0
          mirrorNodeVersion: v0.151.0
          grpcProxyPort: 8080
          dualMode: true
          dualModeGrpcProxyPort: 8081

      - name: Set Operator Account
        run: |
          echo "OPERATOR_KEY=${{ steps.solo.outputs.ed25519PrivateKey }}" >> $GITHUB_ENV
          echo "OPERATOR_ID=${{ steps.solo.outputs.ed25519AccountId }}" >> $GITHUB_ENV
          echo "GENESIS_OPERATOR_KEY=302e020100300506032b65700422042091132178e72057a1d7528025956fe39b0b847f200ab59b2fdd367017f3087137" >> $GITHUB_ENV
          echo "GENESIS_OPERATOR_ID=0.0.2" >> $GITHUB_ENV
          echo "HEDERA_NETWORK=local-node" >> $GITHUB_ENV

      - name: Run DAB Integration Coverage
        run: task test:integration:dual-mode:codecov

      - name: Upload DAB Coverage Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-dab
          if-no-files-found: error
          path: |
            ./coverage/node-integration-dual-mode/lcov.info
            ./coverage/browser-integration-dual-mode/lcov.info

  coverage-upload:
    name: Upload Coverage to Codecov
    runs-on: hiero-client-sdk-linux-medium
    needs:
      - test
      - dab-tests

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Download Test Coverage Artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: coverage-test
          path: .

      - name: Download DAB Coverage Artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: coverage-dab
          path: .

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5.5.3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: >-
            ./coverage/node-integration/lcov.info,
            ./coverage/browser-integration/lcov.info,
            ./packages/cryptography/coverage/node/lcov.info,
            ./packages/cryptography/coverage/browser/lcov.info,
            ./coverage/node/lcov.info,
            ./coverage/browser/lcov.info,
            ./coverage/node-integration-dual-mode/lcov.info,
            ./coverage/browser-integration-dual-mode/lcov.info
          fail_ci_if_error: true

  examples:
    name: Run examples using Node ${{ matrix.node }}
    runs-on: hiero-client-sdk-linux-medium
    strategy:
      matrix:
        node: [ "22" ]
    steps:
      -  name: Harden Runner
         uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
         with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.35.1

      - name: Install PNPM
        uses: step-security/action-setup@3d419c73e38e670dbffe349ffff26dd13c164640 # v4.2.0
        with:
          version: 9.15.5

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies and build SDK
        run: task build

      - name: Prepare Hiero Solo
        id: solo
        uses: hiero-ledger/hiero-solo-action@4d42a74e8e644a2753f3bb7a2afa429305375b14 # v0.17
        with:
          installMirrorNode: true
          soloVersion: v0.68.0
          hieroVersion: v0.72.0
          mirrorNodeVersion: v0.151.0
          grpcProxyPort: 8080

      - name: Set Operator Account
        run: |
          echo "OPERATOR_KEY=${{ steps.solo.outputs.ecdsaPrivateKey }}" >> $GITHUB_ENV
          echo "OPERATOR_ID=${{ steps.solo.outputs.ecdsaAccountId }}" >> $GITHUB_ENV
          echo "GENESIS_OPERATOR_KEY=302e020100300506032b65700422042091132178e72057a1d7528025956fe39b0b847f200ab59b2fdd367017f3087137" >> $GITHUB_ENV
          echo "GENESIS_OPERATOR_ID=0.0.2" >> $GITHUB_ENV
          echo "HEDERA_NETWORK=local-node" >> $GITHUB_ENV

      - name: Install examples dependencies
        run: |
          cd examples
          pnpm i

      - name: Run all examples
        run: task run:examples

  solo-smoke-test:
    name: Solo Smoke Test
    runs-on: hiero-client-sdk-linux-medium

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: "4.0.5"

      - name: Install WGet CLI
        run: sudo apt-get update && sudo apt-get install -y wget

      - name: Install Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.10"

      - name: Setup Kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0 #
        with:
          cluster_name: solo-e2e
          node_image: kindest/node:v1.32.2@sha256:142f543559cc55d64e1ab9341df08e5ced84bd2e893736da8f51320f26f5950b
          kubectl_version: v1.32.2
          version: v0.31.0
          install_only: true
          verbosity: 3
          wait: 120s

      - name: Cleanup Previous Runs
        run: |
          rm -rf ~/.solo
          kind delete cluster --name solo-e2e || true

      - name: Install Solo
        run: npm install -g @hashgraph/solo@0.67.0

      - name: Deploy Solo Test Network
        env:
          SOLO_CLUSTER_NAME: solo-e2e
          SOLO_NAMESPACE: solo
          SOLO_CLUSTER_SETUP_NAMESPACE: solo-cluster
          SOLO_DEPLOYMENT: solo-deployment
          HIERO_VERSION: "v0.72.0"
        run: |
          # Create a Kubernetes cluster using kind
          kind create cluster -n ${SOLO_CLUSTER_NAME}

          # Initialize the Solo CLI configuration
          solo init --dev

          NUM_NODES=1
          NODE_IDS="node1"

          echo "Deploying ${NUM_NODES} consensus node(s)..."

          # Connect the Solo CLI to the kind cluster using a cluster reference name
          solo cluster-ref config connect --cluster-ref kind-${SOLO_CLUSTER_NAME} --context kind-${SOLO_CLUSTER_NAME} --dev
          # Create deployment
          solo deployment config create -n ${SOLO_NAMESPACE} --deployment ${SOLO_DEPLOYMENT} --dev

          # Add the kind cluster to the deployment
          solo deployment cluster attach --deployment ${SOLO_DEPLOYMENT} --cluster-ref kind-${SOLO_CLUSTER_NAME} --num-consensus-nodes ${NUM_NODES} --dev

          # Generate node keys
          solo keys consensus generate --gossip-keys --tls-keys -i ${NODE_IDS} --deployment ${SOLO_DEPLOYMENT} --dev

          # Setup the Solo cluster
          solo cluster-ref config setup -s ${SOLO_CLUSTER_NAME} --dev

          # Deploy network
          solo consensus network deploy -i ${NODE_IDS} --deployment ${SOLO_DEPLOYMENT} --release-tag ${HIERO_VERSION} --dev

          # Setup and start nodes
          solo consensus node setup -i ${NODE_IDS} --deployment ${SOLO_DEPLOYMENT} --release-tag ${HIERO_VERSION} --quiet-mode --dev
          solo consensus node start -i ${NODE_IDS} --deployment ${SOLO_DEPLOYMENT} --dev

          # Debug: List services in the solo namespace
          echo "Listing services in namespace ${SOLO_NAMESPACE}:"
          kubectl get svc -n ${SOLO_NAMESPACE}

          # Debug: Show current user
          echo "Current user: $(whoami)"

          # Add entries to /etc/hosts for easier access (requires sudo)
          echo "Attempting to add entries to /etc/hosts..."
          if sudo -n true 2>/dev/null; then
            echo "127.0.0.1 network-node1-svc.${SOLO_NAMESPACE}.svc.cluster.local" | sudo tee -a /etc/hosts
            echo "127.0.0.1 envoy-proxy-node1-svc.${SOLO_NAMESPACE}.svc.cluster.local" | sudo tee -a /etc/hosts
            echo "Successfully added entries to /etc/hosts"
          else
            echo "⚠️  No sudo access available, skipping /etc/hosts update"
            echo "Nodes can still be accessed via localhost:50211 and localhost:50212"
          fi

          # Port forward HAProxy for node1 (only if service exists)
          if kubectl get svc haproxy-node1-svc -n ${SOLO_NAMESPACE} >/dev/null 2>&1; then
            kubectl port-forward svc/haproxy-node1-svc -n ${SOLO_NAMESPACE} 50211:50211 &
          else
            echo "HAProxy service haproxy-node1-svc not found, skipping port-forward"
          fi

          # Port forward gRPC proxy (only if service exists)
          if kubectl get svc envoy-proxy-node1-svc -n ${SOLO_NAMESPACE} >/dev/null 2>&1; then
            kubectl port-forward svc/envoy-proxy-node1-svc -n ${SOLO_NAMESPACE} 9998:8080 &
          else
            echo "gRPC proxy service envoy-proxy-node1-svc not found, skipping port-forward"
          fi

      - name: Deploy MirrorNode
        env:
          SOLO_CLUSTER_NAME: solo-e2e
          SOLO_NAMESPACE: solo
          SOLO_DEPLOYMENT: solo-deployment
          MIRROR_NODE_VERSION: "v0.151.0"
        run: |
          solo mirror node add --cluster-ref kind-${SOLO_CLUSTER_NAME} --deployment ${SOLO_DEPLOYMENT} --mirror-node-version ${MIRROR_NODE_VERSION} --pinger --dev

          # Debug: List services in the solo namespace
          echo "Listing services in namespace ${SOLO_NAMESPACE}:"
          kubectl get svc -n ${SOLO_NAMESPACE}

          # Port forward mirror node REST API (only if service exists)
          if kubectl get svc mirror-1-rest -n ${SOLO_NAMESPACE} >/dev/null 2>&1; then
            kubectl port-forward svc/mirror-1-rest -n ${SOLO_NAMESPACE} 5551:80 &
          else
            echo "Mirror node service mirror-1-rest not found, skipping port-forward"
          fi

          # Port forward mirror node gRPC (only if service exists)
          if kubectl get svc mirror-1-grpc -n ${SOLO_NAMESPACE} >/dev/null 2>&1; then
            kubectl port-forward svc/mirror-1-grpc -n ${SOLO_NAMESPACE} 5600:5600 &
          else
            echo "Mirror node service mirror-1-grpc not found, skipping port-forward"
          fi

          # Port forward mirror node web3 (only if service exists)
          if kubectl get svc mirror-1-web3 -n ${SOLO_NAMESPACE} >/dev/null 2>&1; then
            kubectl port-forward svc/mirror-1-web3 -n ${SOLO_NAMESPACE} 8545:80 &
          else
            echo "Mirror node service mirror-1-web3 not found, skipping port-forward"
          fi

          # Port forward Java REST API (only if service exists)
          if kubectl get svc mirror-1-restjava -n ${SOLO_NAMESPACE} >/dev/null 2>&1; then
            kubectl port-forward svc/mirror-1-restjava -n ${SOLO_NAMESPACE} 8084:80 &
          else
            echo "Java REST API service mirror-1-restjava not found, skipping port-forward"
          fi

      - name: Create ECDSA Account
        id: create-ecdsa
        env:
          SOLO_NAMESPACE: solo
          SOLO_DEPLOYMENT: solo-deployment
          HBAR_AMOUNT: "10000000"
        run: |
          echo "Creating ECDSA account..."

          solo ledger account create --generate-ecdsa-key --deployment ${SOLO_DEPLOYMENT} --dev > account_create_output_ecdsa.txt

          cat account_create_output_ecdsa.txt
          JSON=$(cat account_create_output_ecdsa.txt | node scripts/extractAccountAsJson.js) || {
            echo "Error: extractAccountAsJson.js failed"
            exit 1
          }

          export ACCOUNT_ID=$(echo ${JSON} | jq -r '.accountId')
          export ACCOUNT_PUBLIC_KEY=$(echo ${JSON} | jq -r '.publicKey')
          export ACCOUNT_PRIVATE_KEY=$(kubectl get secret account-key-${ACCOUNT_ID} -n ${SOLO_NAMESPACE} -o jsonpath='{.data.privateKey}' | base64 -d | xargs)

          solo ledger account update --account-id "${ACCOUNT_ID}" --hbar-amount "${HBAR_AMOUNT}" --deployment "${SOLO_DEPLOYMENT}" --dev

          echo "accountId=${ACCOUNT_ID}"
          echo "publicKey=${ACCOUNT_PUBLIC_KEY}"
          echo "privateKey=${ACCOUNT_PRIVATE_KEY}"
          echo "accountId=${ACCOUNT_ID}" >> ${GITHUB_OUTPUT}
          echo "publicKey=${ACCOUNT_PUBLIC_KEY}" >> ${GITHUB_OUTPUT}
          echo "privateKey=${ACCOUNT_PRIVATE_KEY}" >> ${GITHUB_OUTPUT}

      - name: Create ED25519 Account
        id: create-ed25519
        env:
          SOLO_NAMESPACE: solo
          SOLO_DEPLOYMENT: solo-deployment
          HBAR_AMOUNT: "10000000"
        run: |
          echo "Creating ED25519 account..."

          solo ledger account create --deployment ${SOLO_DEPLOYMENT} --dev > account_create_output_ed25519.txt

          cat account_create_output_ed25519.txt
          JSON=$(cat account_create_output_ed25519.txt | node scripts/extractAccountAsJson.js) || {
            echo "Error: extractAccountAsJson.js failed"
            exit 1
          }

          export ACCOUNT_ID=$(echo ${JSON} | jq -r '.accountId')
          export ACCOUNT_PUBLIC_KEY=$(echo ${JSON} | jq -r '.publicKey')
          export ACCOUNT_PRIVATE_KEY=$(kubectl get secret account-key-${ACCOUNT_ID} -n ${SOLO_NAMESPACE} -o jsonpath='{.data.privateKey}' | base64 -d | xargs)

          solo ledger account update --account-id "${ACCOUNT_ID}" --hbar-amount "${HBAR_AMOUNT}" --deployment "${SOLO_DEPLOYMENT}" --dev

          echo "accountId=${ACCOUNT_ID}"
          echo "publicKey=${ACCOUNT_PUBLIC_KEY}"
          echo "privateKey=${ACCOUNT_PRIVATE_KEY}"
          echo "accountId=${ACCOUNT_ID}" >> ${GITHUB_OUTPUT}
          echo "publicKey=${ACCOUNT_PUBLIC_KEY}" >> ${GITHUB_OUTPUT}
          echo "privateKey=${ACCOUNT_PRIVATE_KEY}" >> ${GITHUB_OUTPUT}

      - name: Teardown Solo Network
        if: always()
        env:
          SOLO_CLUSTER_NAME: solo-e2e
          SOLO_NAMESPACE: solo
        run: |
          echo "Tearing down Solo network..."

          # Kill any port-forward processes
          pkill -f "kubectl port-forward.*${SOLO_NAMESPACE}" || true

          # Delete the kind cluster
          kind delete cluster --name ${SOLO_CLUSTER_NAME} || true

          # Clean up Solo directory
          rm -rf ~/.solo

          echo "Teardown complete"
