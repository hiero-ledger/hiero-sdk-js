        with:
          node-version: 22.12.0

      - name: Install Solo CLI
        run: |
          set -euo pipefail
          npm install -g @hashgraph/solo@0.61.0
          solo --version
          kind --version

      - name: Deploy Solo
        id: solo
        env:
          SOLO_CLUSTER_NAME: solo
          SOLO_NAMESPACE: solo
          SOLO_CLUSTER_SETUP_NAMESPACE: solo-cluster
          SOLO_DEPLOYMENT: solo-deployment
        run: |
          set -euo pipefail
          kind create cluster -n "${SOLO_CLUSTER_NAME}"

          timeout_command=()
          if command -v timeout >/dev/null 2>&1; then
            timeout_command=(timeout --preserve-status 40m)
          elif command -v gtimeout >/dev/null 2>&1; then
            timeout_command=(gtimeout --preserve-status 40m)
          fi

          TEST_EXIT_CODE=0
          set +e
          "${timeout_command[@]}" solo one-shot single deploy --deployment "${SOLO_DEPLOYMENT}" --dev 2>&1 | tee solo-deploy.log
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          set -e
          echo "deployExitCode=${TEST_EXIT_CODE}" >> "${GITHUB_OUTPUT}"

          if [[ "${TEST_EXIT_CODE}" -ne 0 ]]; then
            echo "Solo deploy failed with exit code ${TEST_EXIT_CODE}. Continuing to upload logs."
            exit 0
          fi

          solo ledger account create --generate-ecdsa-key --deployment "${SOLO_DEPLOYMENT}" --dev | tee solo-account-ecdsa.log
          account_id="$(grep -Eo 'accountId[:[:space:]]+[0-9]+\.[0-9]+\.[0-9]+' solo-account-ecdsa.log | tail -n1 | awk '{print $2}')"
          if [[ -z "${account_id}" ]]; then
            account_id="$(grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' solo-account-ecdsa.log | tail -n1)"
          fi
          if [[ -z "${account_id}" ]]; then
            echo "Failed to parse ECDSA account ID from Solo output" >&2
            exit 1
          fi

          solo ledger account update --account-id "${account_id}" --hbar-amount 100 --deployment "${SOLO_DEPLOYMENT}" --dev

          encoded_key=""
          for _ in {1..30}; do
            encoded_key="$(kubectl get secret "account-key-${account_id}" -n "${SOLO_NAMESPACE}" -o jsonpath='{.data.privateKey}' 2>/dev/null || true)"
            if [[ -n "${encoded_key}" ]]; then
              break
            fi
            sleep 2
          done
          if [[ -z "${encoded_key}" ]]; then
            echo "Failed to fetch private key secret for ${account_id}" >&2
            exit 1
          fi

          private_key="$(echo "${encoded_key}" | base64 --decode)"
          if [[ -z "${private_key}" ]]; then
            echo "Failed to decode private key for ${account_id}" >&2
            exit 1
          fi

          {
            echo "ecdsaAccountId=${account_id}"
            echo "ecdsaPrivateKey=${private_key}"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload Solo Debug Logs (Examples)
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: solo-debug-examples
          path: |
            ./solo-deploy.log
            ./solo-account-ecdsa.log
            ~/.solo/logs/*
          overwrite: true
          if-no-files-found: warn

      - name: Fail if Solo Deploy Failed (Examples)
        if: ${{ steps.solo.outputs.deployExitCode != '0' }}
        run: |
          echo "Solo deployment failed with exit code ${{ steps.solo.outputs.deployExitCode }}"
          exit 1

      - name: Set Operator Account
        run: |
          echo "OPERATOR_KEY=${{ steps.solo.outputs.ecdsaPrivateKey }}" >> $GITHUB_ENV
          echo "OPERATOR_ID=${{ steps.solo.outputs.ecdsaAccountId }}" >> $GITHUB_ENV
          echo "GENESIS_OPERATOR_KEY=302e020100300506032b65700422042091132178e72057a1d7528025956fe39b0b847f200ab59b2fdd367017f3087137" >> $GITHUB_ENV
          echo "GENESIS_OPERATOR_ID=0.0.2" >> $GITHUB_ENV
          echo "HEDERA_NETWORK=local-node" >> $GITHUB_ENV

      - name: Install examples dependencies
        run: |
          cd examples
          pnpm i

      - name: Run all examples
        run: task run:examples
