name: "Slack Merge Notification"
on:
    pull_request:
        types:
            - closed

env:
    js-sdk-channel-id: C0958RN2ZTR

defaults:
    run:
        shell: bash

permissions:
    contents: read
    pull-requests: read

jobs:
    notify-slack:
        name: Notify Slack
        if: ${{ github.event.pull_request.merged == true && github.event.pull_request.user.login != 'dependabot[bot]' && github.event.pull_request.user.login != 'codacy-production[bot]' && github.event.pull_request.user.login != 'lfdt-bot' }}
        runs-on: hiero-client-sdk-linux-medium
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
              with:
                  egress-policy: audit

            - name: Send Slack Notification
              uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
              with:
                  method: chat.postMessage
                  token: ${{ secrets.SLACK_BOT_TOKEN }}
                  payload: |
                      {
                        "channel": "${{ env.js-sdk-channel-id }}",
                        "text": ":meow_merged: ${{ github.event.pull_request.head.ref }} has been merged into ${{ github.event.pull_request.base.ref }} by ${{ github.event.pull_request.merged_by.login }} — <${{ github.event.pull_request.html_url }}|#${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}>"
                      }
