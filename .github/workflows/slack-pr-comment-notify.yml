name: 'Slack PR Comment Notification'
on:
  issue_comment:
    types:
      - created

env:
  js-sdk-channel-id: C0958RN2ZTR

defaults:
  run:
    shell: bash

permissions:
  contents: read
  pull-requests: read

jobs:
  notify-slack:
    name: Notify Slack
    if: ${{ github.event.issue.pull_request && github.event.comment.user.login != 'dependabot[bot]' && github.event.comment.user.login != 'codacy-production[bot]' && github.event.comment.user.login != 'lfdt-bot' && github.event.comment.user.login != 'codecov[bot]' }}
    runs-on: hiero-client-sdk-linux-medium
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Send Slack Notification
        uses: slackapi/slack-github-action@dcb1066f776dd043e64d0e8ba94ca15cc7e1875d # v4.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ env.js-sdk-channel-id }}",
              "text": ":speech_balloon: ${{ github.event.comment.user.login }} commented on ${{ github.event.issue.user.login }}'s PR <${{ github.event.issue.html_url }}|#${{ github.event.issue.number }}: ${{ github.event.issue.title }}>"
            }
